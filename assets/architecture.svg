<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="Inter, -apple-system, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#45566A"/>
    </marker>
  </defs>

  <rect width="980" height="720" fill="#FFFFFF"/>

  <!-- Browser -->
  <rect x="380" y="20" width="220" height="56" rx="10" fill="#E4F3F1" stroke="#0E7C74" stroke-width="1.5"/>
  <text x="490" y="45" text-anchor="middle" font-size="14" font-weight="700" fill="#16232D">Browser</text>
  <text x="490" y="63" text-anchor="middle" font-size="11.5" fill="#45566A">client/static/index.html</text>

  <line x1="490" y1="76" x2="490" y2="108" stroke="#45566A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="96" font-size="11" fill="#45566A">HTTP (same-origin)</text>

  <!-- FastAPI process outer box -->
  <rect x="40" y="110" width="900" height="430" rx="14" fill="#ECF2F4" stroke="#C9D6DD" stroke-width="1.5"/>
  <text x="60" y="136" font-size="13.5" font-weight="700" fill="#16232D">FastAPI app — single process (server/main.py)</text>

  <!-- StaticFiles + routes -->
  <rect x="65" y="155" width="230" height="56" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
  <text x="180" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">StaticFiles mount "/"</text>
  <text x="180" y="195" text-anchor="middle" font-size="11" fill="#45566A">serves index.html</text>

  <rect x="330" y="155" width="620" height="56" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
  <text x="640" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">api/routes.py</text>
  <text x="640" y="195" text-anchor="middle" font-size="11" fill="#45566A">/chat · /vector_store/* · /auth/* · /chat_sessions/* · /upload_and_process_pdfs · /llm/*</text>

  <line x1="330" y1="183" x2="295" y2="183" stroke="#45566A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- rate limit / auth guard note -->
  <rect x="330" y="222" width="620" height="30" rx="6" fill="#F1F6F6" stroke="#DCE6EB" stroke-width="1"/>
  <text x="640" y="241" text-anchor="middle" font-size="11" fill="#45566A">slowapi rate limiting  ·  optional session-cookie auth (core/auth.py) on every request</text>

  <!-- Core modules row -->
  <g font-size="11.5">
    <rect x="65" y="270" width="165" height="80" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
    <text x="147" y="292" text-anchor="middle" font-weight="700" fill="#16232D">vector_database.py</text>
    <text x="147" y="308" text-anchor="middle" fill="#45566A">Embeddings +</text>
    <text x="147" y="322" text-anchor="middle" fill="#45566A">ChromaDB ops,</text>
    <text x="147" y="336" text-anchor="middle" fill="#45566A">caching</text>

    <rect x="245" y="270" width="165" height="80" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
    <text x="327" y="292" text-anchor="middle" font-weight="700" fill="#16232D">llm_chain_factory.py</text>
    <text x="327" y="308" text-anchor="middle" fill="#45566A">RAG + agent</text>
    <text x="327" y="322" text-anchor="middle" fill="#45566A">orchestration,</text>
    <text x="327" y="336" text-anchor="middle" fill="#45566A">LLM call</text>

    <rect x="425" y="270" width="165" height="80" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
    <text x="507" y="292" text-anchor="middle" font-weight="700" fill="#16232D">agent_tools.py</text>
    <text x="507" y="308" text-anchor="middle" fill="#45566A">Live PubMed /</text>
    <text x="507" y="322" text-anchor="middle" fill="#45566A">ClinicalTrials fetch,</text>
    <text x="507" y="336" text-anchor="middle" fill="#45566A">ML triggers</text>

    <rect x="605" y="270" width="150" height="80" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
    <text x="680" y="292" text-anchor="middle" font-weight="700" fill="#16232D">ml_tools.py</text>
    <text x="680" y="308" text-anchor="middle" fill="#45566A">Severity +</text>
    <text x="680" y="322" text-anchor="middle" fill="#45566A">phase prediction</text>
    <text x="680" y="336" text-anchor="middle" fill="#45566A">models</text>

    <rect x="770" y="270" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5"/>
    <text x="860" y="292" text-anchor="middle" font-weight="700" fill="#16232D">auth.py / auth_db.py</text>
    <text x="860" y="308" text-anchor="middle" fill="#45566A">Password hashing,</text>
    <text x="860" y="322" text-anchor="middle" fill="#45566A">sessions, account-</text>
    <text x="860" y="336" text-anchor="middle" fill="#45566A">linked chat history</text>
  </g>

  <line x1="640" y1="211" x2="640" y2="222" stroke="#45566A" stroke-width="1.5"/>
  <line x1="147" y1="252" x2="147" y2="270" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="327" y1="252" x2="327" y2="270" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="507" y1="252" x2="507" y2="270" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="252" x2="680" y2="270" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="860" y1="252" x2="860" y2="270" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- background thread note -->
  <rect x="65" y="368" width="885" height="34" rx="6" fill="#FBF9F4" stroke="#B7C7D1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="507" y="389" text-anchor="middle" font-size="11" fill="#45566A">startup: init_auth_db() + background thread warms embeddings/vectorstore caches — server accepts connections immediately</text>

  <!-- Persistent storage row -->
  <rect x="65" y="425" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#B7C7D1" stroke-width="1.5"/>
  <text x="175" y="450" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">ChromaDB</text>
  <text x="175" y="467" text-anchor="middle" font-size="11" fill="#45566A">server/data/{provider}_vector_store/</text>
  <text x="175" y="482" text-anchor="middle" font-size="11" fill="#45566A">(80k+ chunks, persisted on disk)</text>

  <rect x="310" y="425" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#B7C7D1" stroke-width="1.5"/>
  <text x="420" y="450" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">SQLite — app.db</text>
  <text x="420" y="467" text-anchor="middle" font-size="11" fill="#45566A">users, sessions,</text>
  <text x="420" y="482" text-anchor="middle" font-size="11" fill="#45566A">chat_sessions, chat_messages</text>

  <rect x="555" y="425" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#B7C7D1" stroke-width="1.5"/>
  <text x="665" y="450" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">ml/models/</text>
  <text x="665" y="467" text-anchor="middle" font-size="11" fill="#45566A">severity_model.pkl,</text>
  <text x="665" y="482" text-anchor="middle" font-size="11" fill="#45566A">phase_classifier.pt</text>

  <line x1="147" y1="350" x2="175" y2="425" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="860" y1="350" x2="420" y2="425" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="350" x2="665" y2="425" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- External services -->
  <text x="60" y="580" font-size="13.5" font-weight="700" fill="#16232D">External services (called over the internet, not hosted by this app)</text>

  <rect x="65" y="595" width="270" height="70" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="200" y="622" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">Groq API / Gemini API</text>
  <text x="200" y="640" text-anchor="middle" font-size="11" fill="#45566A">LLM inference (Gemini currently disabled)</text>
  <text x="200" y="654" text-anchor="middle" font-size="11" fill="#45566A">Gemini also used for embeddings</text>

  <rect x="360" y="595" width="290" height="70" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="505" y="622" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">PubMed / ClinicalTrials.gov</text>
  <text x="505" y="640" text-anchor="middle" font-size="11" fill="#45566A">Live fetch on every chat message,</text>
  <text x="505" y="654" text-anchor="middle" font-size="11" fill="#45566A">run in parallel, cited in the trace</text>

  <rect x="670" y="595" width="280" height="70" rx="8" fill="#FFFFFF" stroke="#DCE6EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="810" y="622" text-anchor="middle" font-size="12.5" font-weight="700" fill="#16232D">sentence-transformers</text>
  <text x="810" y="640" text-anchor="middle" font-size="11" fill="#45566A">Local CPU embedding model</text>
  <text x="810" y="654" text-anchor="middle" font-size="11" fill="#45566A">(Groq provider), no external call</text>

  <line x1="327" y1="350" x2="200" y2="595" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <line x1="507" y1="350" x2="505" y2="595" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <line x1="147" y1="350" x2="810" y2="595" stroke="#45566A" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="3 3" opacity="0.6"/>

  <text x="60" y="700" font-size="11" fill="#8FA0AE">Pharma R&amp;D Assistant — architecture as of this repo's initial production-readiness pass</text>
</svg>
